function setQuickBtns(hints){

  hints.forEach(h=>{

    b.className='qbtn'; b.textContent=h;
    b.onclick=()=>{

      send();
    };
    el.appendChild(b);
  });
}

function parseOccupation(t){
  t=t.toLowerCase();
  if(/farmer|kisan|किसान|விவசாய/.test(t))return "farmer";
  if(/artisan|craft|carpenter|potter|weaver|कारीगर|கைவினை|tailor|mason|blacksmith|cobbler|barber/.test(t))return "artisan";
  if(/gig|delivery|swiggy|uber|ola/.test(t))return "gig worker";
  if(/daily|labour|mazdoor|मजदूर|கூலி/.test(t))return "daily wage";
  return "other";
}

function parseIncome(t){
  t=t.toLowerCase().replace(/,/g,'');
  const lakh=t.match(/(\d+\.?\d*)\s*lakh/);
  if(lakh)return parseFloat(lakh[1])*100000;
  const k=t.match(/(\d+)\s*k/);
  if(k)return parseFloat(k[1])*1000;
  const n=t.match(/\d+/);
  if(n){let v=parseInt(n[0]);if(v<1000)v*=1000;return v;}
  return 0;
}

function parseBool(t){
  return /yes|haan|ha|हां|ஆம்|^y$|^1$/.test(t.toLowerCase().trim());
}

function filterEligibility(){
  const occ=profile.occupation||"";
  const gender=(profile.gender||"").toLowerCase();
  const res=(profile.residence||"rural").toLowerCase();
  const income=profile.income||0;
  const land=profile.land_hectares||0;
  const bpl=profile.is_bpl||false;
  const matched=[];

  SCHEMES.forEach(s=>{
    let score=0;
    if(s.id==="pm_kisan"){
      if(occ==="farmer"&&land>0&&land<=2&&res==="rural")score=3;
    } else if(s.id==="ayushman_bharat"){
      if(income<300000||bpl)score=3;
    } else if(s.id==="pmay_gramin"){
      if(res==="rural")score=2;
    } else if(s.id==="ujjwala"){
      if(gender==="female"&&bpl)score=3;
    } else if(s.id==="nrega"){
      if(res==="rural")score=2;
    } else if(s.id==="pm_vishwakarma"){
      if(/artisan|carpenter|weaver|tailor|potter|blacksmith|cobbler|mason|barber/.test(occ))score=3;
    } else if(s.id==="e_shram"){
      if(/gig|daily|construction|domestic|vendor|labour/.test(occ))score=3;
    }
    if(score>0){const r={...s,_score:score};matched.push(r);}
  });
  matched.sort((a,b)=>b._score-a._score);
  return matched;
}

  if(state==="greeting"){
    if(/^1$|hindi|हिंदी/.test(msg.trim())){lang="hi";document.querySelectorAll('.lang-btn').forEach((b,i)=>{b.classList.toggle('active',i===1)});}
    else if(/^2$|tamil|தமிழ்/.test(msg.trim())){lang="ta";document.querySelectorAll('.lang-btn').forEach((b,i)=>{b.classList.toggle('active',i===2)});}
    else if(/^3$|english/.test(msg.trim())){lang="en";document.querySelectorAll('.lang-btn').forEach((b,i)=>{b.classList.toggle('active',i===0)});}
    state="collecting"; step=0; profile={};
    setQuickBtns(QUICK_HINTS[lang][Q[0][0]]);
    return QUESTIONS[lang][0][1];
  }

  if(state==="collecting"){
    const curQ=QUESTIONS[lang];
    if(step>0){
      const [field]=curQ[step-1];
      if(field==="occupation")profile.occupation=parseOccupation(msg);
      else if(field==="residence")profile.residence=/rural|village|gram|gaon|गांव|கிராம/.test(msg.toLowerCase())?"rural":"urban";
      else if(field==="gender")profile.gender=/female|woman|mahila|महिला|பெண்|^f$|^2$/.test(msg.toLowerCase())?"female":"male";
      else if(field==="income")profile.income=parseIncome(msg);
      else if(field==="land_hectares"){const m=msg.replace(/,/g,'').match(/\d+\.?\d*/);profile.land_hectares=m?parseFloat(m[0]):0;}
      else if(field==="is_bpl")profile.is_bpl=parseBool(msg);
    }
    if(step<curQ.length){
      const nextField=curQ[step][0];
      const hint=QUICK_HINTS[lang][nextField];
      step++;
      setQuickBtns(hint||[]);
      return curQ[step-1][1];
    } else {
      state="results";
      matchedSchemes=filterEligibility();
      setQuickBtns([]);
      if(!matchedSchemes.length){
        return {en:"😔 Based on your answers, no exact matches found. Visit myscheme.gov.in or your nearest CSC center.",
                hi:"😔 आपके जवाबों के आधार पर कोई योजना नहीं मिली। myscheme.gov.in पर जाएं।",
                ta:"😔 உங்கள் பதில்களை வைத்து எந்த திட்டமும் கிடைக்கவில்லை. myscheme.gov.in பார்க்கவும்."}[lang];
      }
      const hdr={en:"🎯 You may qualify for these schemes:",hi:"🎯 आप इन योजनाओं के लिए पात्र हो सकते हैं:",ta:"🎯 நீங்கள் இந்த திட்டங்களுக்கு தகுதியானவராக இருக்கலாம்:"}[lang];
      const lines=[hdr];
      matchedSchemes.slice(0,5).forEach((s,i)=>lines.push(`${i+1}. ${getName(s)}`));
      const ftr={en:"\nReply with a number (1-5) to get required documents.",hi:"\nदस्तावेज़ जानने के लिए नंबर भेजें (1-5).",ta:"\nஆவணங்கள் தெரிய எண் அனுப்புங்கள் (1-5)."}[lang];
      lines.push(ftr);
      setQuickBtns(QUICK_HINTS[lang].results.slice(0,matchedSchemes.length));
      return lines.join("\n");
    }
  }

  if(state==="results"){
    const num=parseInt(msg.trim())-1;
    if(!isNaN(num)&&num>=0&&num<matchedSchemes.length){
      const s=matchedSchemes[num];
      const docs=getDocs(s).map((d,i)=>`  ${i+1}. ${d}`).join("\n");
      const nameLabel={en:`📋 Documents for ${getName(s)}:`,hi:`📋 ${getName(s)} के लिए दस्तावेज़:`,ta:`📋 ${getName(s)} ஆவணங்கள்:`}[lang];
      const stepLabel={en:`\n\n📝 How to apply:\n${s.apply_steps}`,hi:`\n\n📝 आवेदन कैसे करें:\n${s.apply_steps}`,ta:`\n\n📝 விண்ணப்பிப்பது எப்படி:\n${s.apply_steps}`}[lang];
      const urlLabel={en:`\n\nApply at: ${s.apply_url}`,hi:`\n\nआवेदन: ${s.apply_url}`,ta:`\n\nவிண்ணப்பிக்க: ${s.apply_url}`}[lang];
      const more={en:"\n\nType 'menu' to see other schemes or 'restart' to start over.",hi:"\n\n'menu' टाइप करें अन्य योजनाओं के लिए, 'restart' से फिर शुरू करें।",ta:"\n\n'menu' என்று தட்டச்சு செய்யுங்கள் மேலும் திட்டங்களுக்கு."}[lang];
      state="doc_detail";
      setQuickBtns(["menu","restart"]);
      return `${nameLabel}\n${docs}${stepLabel}${urlLabel}${more}`;
    }
    return {en:"Please send a number from the list above.",hi:"ऊपर दी गई सूची से एक नंबर भेजें।",ta:"மேலே உள்ள பட்டியலிலிருந்து எண் அனுப்புங்கள்."}[lang];
  }

  if(state==="doc_detail"||msg.toLowerCase()==="menu"){
    if(msg.toLowerCase()==="menu"&&matchedSchemes.length){
      state="results";
      const hdr={en:"🎯 Schemes you may qualify for:",hi:"🎯 आपके लिए योजनाएं:",ta:"🎯 உங்களுக்கான திட்டங்கள்:"}[lang];
      const lines=[hdr];
      matchedSchemes.slice(0,5).forEach((s,i)=>lines.push(`${i+1}. ${getName(s)}`));
      setQuickBtns(QUICK_HINTS[lang].results.slice(0,matchedSchemes.length));
      return lines.join("\n");
    }
  }

  if(/restart|फिर|மறுதொடக்கம்/.test(msg.toLowerCase())){
    state="greeting"; step=0; profile={}; matchedSchemes=[];
    setQuickBtns(QUICK_HINTS[lang].lang);
    return GREETINGS[lang];
  }

  return {en:"I didn't understand that. Please reply with one of the suggested options.",hi:"मुझे समझ नहीं आया। कृपया दिए गए विकल्पों में से जवाब दें।",ta:"புரியவில்லை. கொடுக்கப்பட்ட விருப்பங்களில் பதிலளிக்கவும்."}[lang];
}

function send(){
  const inp=document.getElementById('userInput');
  const msg=inp.value.trim();
  if(!msg)return;
  inp.value='';
  userSay(msg);
  setQuickBtns([]);
  typingIndicator();
  setTimeout(()=>{
    removeTyping();
    const reply=processMessage(msg);
    botSay(reply);
  }, 600);
}

resetChat();
</script>
